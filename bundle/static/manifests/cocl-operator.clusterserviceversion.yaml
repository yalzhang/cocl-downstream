apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "trusted-execution-clusters.io/v1alpha1",
          "kind": "TrustedExecutionCluster",
          "metadata": {
            "name": "confidential-cluster"
          },
          "spec": {
            "trusteeImage": "quay.io/trusted-execution-clusters/key-broker-service:tpm-verifier-built-in-as-20250711",
            "pcrsComputeImage": "quay.io/trusted-execution-clusters/compute-pcrs:v0.1.0",
            "registerServerImage": "quay.io/trusted-execution-clusters/registration-server:v0.1.0",
            "publicTrusteeAddr": "kbs-service.confidential-clusters.svc.cluster.local:8080"
          }
        },
        {
          "apiVersion": "trusted-execution-clusters.io/v1alpha1",
          "kind": "ApprovedImage",
          "metadata": {
            "name": "example-approvedimage"
          },
          "spec": {
            "image": "quay.io/fedora/fedora-coreos@sha256:e71dad00aa0e3d70540e726a0c66407e3004d96e045ab6c253186e327a2419e5"
          }
        }
      ]
    olm.skipRange: ">=0.0.0 <1.0.0"
    containerImage: "quay.io/confidential-clusters/cocl-operator:v0.1.0"
    capabilities: Basic Install
  name: cocl-operator.v0.1.0
  namespace: placeholder
spec:
  displayName: Confidential Cluster operator
  description: The Confidential Cluster operator introduces the TrustedExecutionCluster Custom Resource Definition (CRD) to enable declarative configuration of confidential OpenShift clusters. The operator watches TrustedExecutionCluster resources and reconciles the configuration of the trustee service responsible for remote attestation. This includes managing Key Broker Service (KBS) configuration, attestation policies, and resource access policies required for confidential workloads. By continuously reconciling the desired state, the Confidential Cluster operator enables OpenShift clusters running in trusted execution environments to attest their integrity to external relying parties.
  version: 0.1.0
  minKubeVersion: "1.27.0"
  provider:
    name: Red Hat
  icon:
    - base64data: "<base64 PNG>"
      mediatype: "image/png"
  # replaces: cocl-operator.vX.Y.Z # Uncomment and set this to the previous CSV name when updating the operator.

  maturity: alpha
  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: false
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: false
  install:
    strategy: deployment
    spec:
      clusterPermissions:
        - serviceAccountName: trusted-cluster-operator
          rules: []
      deployments:
        - name: cocl-operator
          spec:
            replicas: 1
            selector:
              matchLabels:
                name: cocl-operator
            template:
              metadata:
                labels:
                  name: cocl-operator
              spec:
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 65534
                serviceAccountName: trusted-cluster-operator
                containers:
                  - name: cocl-operator
                    image: quay.io/confidential-clusters/cocl-operator:v0.1.0
                    command:
                      - /usr/bin/operator
                    imagePullPolicy: IfNotPresent
                    env:
                      - name: WATCH_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: POD_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.name
                      - name: OPERATOR_NAME
                        value: "cocl-operator"
                      - name: COMPUTE_PCRS_IMAGE
                        value: "quay.io/trusted-execution-clusters/compute-pcrs:v0.1.0"
                      - name: REGISTER_SERVER_IMAGE
                        value: "quay.io/trusted-execution-clusters/registration-server:v0.1.0"
                    resources:
                      limits:
                        cpu: 500m
                        memory: 256Mi
                      requests:
                        cpu: 100m
                        memory: 128Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
  customresourcedefinitions:
    owned:
      - name: trustedexecutionclusters.trusted-execution-clusters.io
        version: v1alpha1
        kind: TrustedExecutionCluster
        displayName: Confidential Cluster
        description: Represents a confidential cluster.
      - name: machines.trusted-execution-clusters.io
        version: v1alpha1
        kind: Machine
        displayName: Machine
        description: Represents a machine in a confidential cluster.
      - name: approvedimages.trusted-execution-clusters.io
        version: v1alpha1
        kind: ApprovedImage
        displayName: Approved Image
        description: Represents a container image approved for execution.